<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mozilla Layout</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="topo">
        <div class="mozzila">Mozilla</div>
        <div class="menu">
            <div class="fonte">Produtos</div>
            <div class="fonte">Sobre nós</div>
        </div>
        <div></div>
    </div>        

    <div class="container">                                         
        <h1 class="boas-vindas">Boas-vindas <br> à Mozilla</h1>

        <div class="texto_desde">
            
            Desde tecnologia confiável até políticas que defendem seus <br>
            direitos digitais, colocamos você em primeiro lugar — sempre.
        

        </div>

        
        <div class="texto_saiba">Saiba mais sobre nós</div>


        
        <div class="area_direita">
            <div class="botao_animacao">
                <span class="play">▷</span>
                <span>Reproduzir animação</span>
            </div>

            <svg class="logo_verde" viewBox="0 0 310 380" xmlns="http://www.w3.org/2000/svg">
                <rect y="17.03" width="46.4" height="362.94" fill="#00D648"/>

                <rect x="84.39" y="57.51" width="41.88" height="41.88" fill="#00D648"/>
                <rect x="126.27" y="17.03" width="22.23" height="40.48" fill="#00D648"/>
                <rect x="148.5" y="0.03" width="161.41" height="40.48" fill="#00D648"/>

                <polygon 
                    fill="#00D648"
                    points="
                    309.91 40.51
                    309.91 74.02
                    212.53 107.62
                    212.53 118.05
                    309.91 151.65
                    309.91 225.64
                    84.39 225.64
                    84.39 185.16
                    268.12 185.16
                    268.12 174.73
                    148.5 131.17
                    148.5 94.5
                    268.12 51.1
                    268.12 40.51
                    "
                />
            </svg>
        </div>

        <div class="recorte">
            <div class="nivel nivel1"></div>
            <div class="nivel nivel2"></div>
            <div class="nivel nivel3"></div>
            <div class="nivel nivel4"></div>
        </div>
    </div>

    <h1 class="texto_volte">Volte a amar a internet</h1>
    <div></div>
    
</body>
</html>
